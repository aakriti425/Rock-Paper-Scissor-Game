<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissor Game</title>
    <link rel="stylesheet" href="rockpaperScissor.css">
</head>

<body>
    <header>
        <div class="navbar">
            <h1>Rock Paper Scissor ✌️✊🤚</h1>
        </div>
    </header>
    <div class="images">
        <span id="rock" class="emoji">
            <h1>✊</h1>
        </span>
        <span id ="paper" class="emoji" >
            <h1 >🤚</h1>
        </span>
        <span id="scissor" class="emoji">
            <h1>✌️</h1>
        </span>
    </div>

    <div class="score">
        <div class="user">
            <h1 id="usercount">0</h1>
            <p>You</p>
        </div>
        <div class="computer">
            <h1 id="compCount">0</h1>
            <p>AI</p>
        </div>
    </div>

    <div class="message">
        <p id="mssg">Pick Your Move </p>
    </div>

    <div id="reset"><p id="gamereset">Reset Game</p></div>
</body>
<script src="rockpaperScissor.js"></script>

</html>
